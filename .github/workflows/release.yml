name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - uses: android-actions/setup-android@v3
      - run: yes | sdkmanager "platforms;android-36" "build-tools;36.1.0"

      - name: Restore signing key
        env:
          SIGNING_KEY: ${{ secrets.ANDROID_SIGNING_KEY_BASE64 }}
        run: |
          test -n "$SIGNING_KEY"
          printf '%s' "$SIGNING_KEY" | base64 --decode > "$RUNNER_TEMP/freelift5.jks"

      - name: Test and build signed APK
        env:
          FREELIFT5_KEYSTORE_PATH: ${{ runner.temp }}/freelift5.jks
          FREELIFT5_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
          FREELIFT5_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          FREELIFT5_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
        run: |
          VERSION_NAME="${GITHUB_REF_NAME#v}"
          ./gradlew testDebugUnitTest lintDebug assembleRelease \
            -PVERSION_NAME="$VERSION_NAME" \
            -PVERSION_CODE="$GITHUB_RUN_NUMBER" \
            --stacktrace

      - name: Prepare release files
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk \
            "dist/FreeLift5-${GITHUB_REF_NAME}.apk"
          cd dist
          sha256sum "FreeLift5-${GITHUB_REF_NAME}.apk" \
            > "FreeLift5-${GITHUB_REF_NAME}.apk.sha256"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --generate-notes \
            --title "FreeLift5 ${GITHUB_REF_NAME}"
